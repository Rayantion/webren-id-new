    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .badge-dot { width: 7px; height: 7px; background: var(--teal); border-radius: 50%; animation: pulse 2s infinite; }

    .join-hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); margin-bottom: 1rem; }

    .join-hero p { color: var(--text-2); font-size: 1.1rem; max-width: 560px; margin: 0 auto 2rem; }
    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }

    /* Buttons */
    .btn-primary {
      background: var(--teal); color: #fff; border: none;
      padding: 0.85rem 1.75rem; border-radius: 10px; cursor: pointer;
      font-size: 1rem; font-weight: 600; font-family: inherit;
      transition: all var(--transition); display: inline-flex; align-items: center; gap: 8px;
      min-height: 50px; text-decoration: none;
      -webkit-tap-highlight-color: transparent;

    .btn-primary:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,148,136,0.3); }
    .btn-outline {

    .perk-card {

    .faq-item { border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
    .faq-q {

    @media (max-width: 768px) {
      .steps-grid, .pricing-grid, .perks-grid { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: 1fr; }
      .stat-item + .stat-item { border-left: none; border-top: 1.5px solid var(--border); }
      .join-hero { padding: 5rem 0 3rem; }

    @media (max-width: 480px) {
      .join-hero { padding: 4rem 0 2rem; }

      .btn-primary, .btn-outline { width: 100%; justify-content: center; }
      .section { padding: 3rem 0; }
      .step-card { padding: 1.5rem; }
      .cta-box { padding: 2rem 1.25rem; }
    }
